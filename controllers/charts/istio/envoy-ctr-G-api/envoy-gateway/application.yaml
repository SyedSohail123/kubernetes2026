apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  project: default

  sources:
    - repoURL: oci://docker.io/envoyproxy
      chart: gateway-helm
      targetRevision: v1.4.4

      helm:
        valueFiles:
          - $values/controllers/charts/gateway-api/envoy-gateway/values.yaml

    - repoURL: https://github.com/SyedSohail123/kubernetes2026.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
