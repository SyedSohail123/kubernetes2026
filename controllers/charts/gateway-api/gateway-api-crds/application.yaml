apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: default

  sources:
    - repoURL: oci://ghcr.io/nginx/charts
      chart: gateway-api-crds
      targetRevision: 1.4.0

      helm:
        valueFiles:
          - $values/controllers/charts/gateway-api/gateway-api-crds/values.yaml

    - repoURL: https://github.com/SyedSohail123/kubernetes2026.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
